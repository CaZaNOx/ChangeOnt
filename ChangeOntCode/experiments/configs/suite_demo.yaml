# Reduced demo runner config
out_root: outputs/verify/demo_suite
inject_co: false
max_workers: 2

families:
  bandit:
    problems:
      - mode: easy
        env: { probs: [0.10, 0.20, 0.80], horizon: 50 }
        seeds: [0]
        agents:
          - { type: ucb1 }
          - { type: kl_ucb }
        
  maze:
    envs:
      - mode: maze_9x9
        env: { spec_path: environments/maze1/spec_9x9.yaml }
        episodes: 1
        seeds: [0]
        agents:
          - { type: bfs }
          - { type: astar }

  renewal:
    instances:
      - mode: clean
        env: { A: 4, L_win: 3, p_ren: 0.02, p_noise: 0.00, T_max: 50 }
        steps: 50
        seeds: [0]
        agents:
          - { type: last }
          - { type: phase }
