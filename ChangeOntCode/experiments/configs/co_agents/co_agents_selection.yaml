        bandit_stats: {}
        ngram_model: {}
      combinator:
        order: ["ghvc","vote_bridge","action_head"]

  - type: "co"
    name: "CO_EC_only"
    params:
      header: { mode: "SSI" }
      elements:
        haq:         { enabled: false }
        ghvc:        { enabled: false }
        EC_Identity: { enabled: true }
        density:     { enabled: false }
        change_ops:  { enabled: false }
        vote_bridge: { enabled: true }
        action_head:
          enabled: true
