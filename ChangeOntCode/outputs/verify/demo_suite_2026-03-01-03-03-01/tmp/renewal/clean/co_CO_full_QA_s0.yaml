job:
  family: renewal
  mode: clean
  seed: 0
  agent_id: co_CO_full_QA
  agent_type: co
  agent_name: CO_full_QA
  out_dir: outputs/verify/demo_suite_2026-03-01-03-03-01/renewal/clean/co_CO_full_QA_s0
  runner: experiments.runners.renewal_runner
env:
  kind: renewal
  spec: {}
  params:
    A: 4
    L_win: 3
    p_ren: 0.02
    p_noise: 0.0
    T_max: 50
agent:
  type: co
  name: CO_full_QA
  params:
    header:
      mode: SSI
    elements:
      haq:
        enabled: true
        history_len: 64
        ema_alpha: 0.2
      ghvc:
        enabled: true
        mdl_lambda: 1.0
        cooldown: 1
        birth_threshold: 0.01
      EC_Identity:
        enabled: true
      density:
        enabled: true
        rounding: 2
      change_ops:
        enabled: true
        k: 4
        mdl_select: true
      vote_bridge:
        enabled: true
      action_head:
        enabled: true
        prefer_bus_if_present: true
        use_translator: true
        blend_mode: mix
        classic_planner: greedy
        co_weight_override: null
        eps_on_cycle: 0.1
        ngram_order: 2
        greedy_explore_bias: 0.1
    primitives:
      co_bus: {}
      P0: {}
      bandit_stats: {}
      ngram_model: {}
    combinator:
      order:
      - haq
      - ghvc
      - EC_Identity
      - density
      - change_ops
      - vote_bridge
      - action_head
run:
  steps: 200
  episodes: null
  horizon: null
logging:
  write_metrics: true
  write_budget: true
  write_plot: true
