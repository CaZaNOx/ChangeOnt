# Minimal CO variants for demo/QA
apply_to_all_families: true
apply_to_all_modes: true

co_agents:
  - type: "co"
    name: "CO_full"
    params:
      header: { mode: "SSI" }
      elements:
        haq:         { enabled: true,  history_len: 64, ema_alpha: 0.2 }
        ghvc:        { enabled: true,  mdl_lambda: 1.0, cooldown: 5, birth_threshold: 2.0 }
        EC_Identity: { enabled: true }
        density:     { enabled: true,  rounding: 2 }
        change_ops:  { enabled: true,  k: 4, mdl_select: true }
        vote_bridge: { enabled: true }
        action_head:
          enabled: true
          prefer_bus_if_present: true
          use_translator: true
          blend_mode: "mix"
          classic_planner: "greedy"
          co_weight_override: null
          eps_on_cycle: 0.10
          ngram_order: 2
          greedy_explore_bias: 0.10
      primitives:
        co_bus: {}
        P0: {}
        bandit_stats: {}
        ngram_model: {}
      combinator:
        order: ["haq","ghvc","EC_Identity","density","change_ops","vote_bridge","action_head"]

  # QA-leaning variant for stronger GHVC signals
  - type: "co"
    name: "CO_full_QA"
    params:
      header: { mode: "SSI" }
      elements:
        haq:         { enabled: true,  history_len: 64, ema_alpha: 0.2 }
        ghvc:        { enabled: true,  mdl_lambda: 1.0, cooldown: 1, birth_threshold: 0.01 }
        EC_Identity: { enabled: true }
        density:     { enabled: true,  rounding: 2 }
        change_ops:  { enabled: true,  k: 4, mdl_select: true }
        vote_bridge: { enabled: true }
        action_head:
          enabled: true
          prefer_bus_if_present: true
          use_translator: true
          blend_mode: "mix"
          classic_planner: "greedy"
          co_weight_override: null
          eps_on_cycle: 0.10
          ngram_order: 2
          greedy_explore_bias: 0.10
      primitives:
        co_bus: {}
        P0: {}
        bandit_stats: {}
        ngram_model: {}
      combinator:
        order: ["haq","ghvc","EC_Identity","density","change_ops","vote_bridge","action_head"]
