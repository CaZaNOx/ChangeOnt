env:
  probs: [0.10, 0.20, 0.80]
  horizon: 200
agent:
  type: co
  name: CO_full_QA
  params:
    header: { mode: "SSI" }
    elements:
      haq:         { enabled: true,  history_len: 64, ema_alpha: 0.2 }
      ghvc:        { enabled: true,  mdl_lambda: 1.0, cooldown: 1, birth_threshold: 0.01 }
      EC_Identity: { enabled: true }
      density:     { enabled: true,  rounding: 2 }
      change_ops:  { enabled: true,  k: 4, mdl_select: true }
      vote_bridge: { enabled: true }
      action_head:
        enabled: true
        prefer_bus_if_present: true
        use_translator: true
        blend_mode: "mix"
        classic_planner: "greedy"
        co_weight_override: null
        eps_on_cycle: 0.10
        ngram_order: 2
        greedy_explore_bias: 0.10
    primitives:
      co_bus: {}
      P0: {}
      bandit_stats: {}
      ngram_model: {}
    combinator:
      order: ["haq","ghvc","EC_Identity","density","change_ops","vote_bridge","action_head"]
seed: 0
out: outputs/verify/qa_bandit
