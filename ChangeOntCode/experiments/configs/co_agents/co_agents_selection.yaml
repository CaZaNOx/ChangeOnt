  # ===== Experiment doctrine: element combination =====
  - type: "co"
    name: "CO_EA_EB"
    params:
      header: { mode: "SSI" }
      elements:
        haq:         { enabled: true,  history_len: 64, ema_alpha: 0.2 }
        ghvc:        { enabled: true,  mdl_lambda: 1.0, cooldown: 5, birth_threshold: 2.0 }
        EC_Identity: { enabled: false }
